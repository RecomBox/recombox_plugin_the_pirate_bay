name: Build Flutter FFI Library

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows desktop
          - target: x86_64-pc-windows-msvc
            ext: dll
            os: windows-latest

          # Linux desktop
          - target: x86_64-unknown-linux-gnu
            ext: so
            os: ubuntu-latest

          # macOS Intel
          - target: x86_64-apple-darwin
            ext: dylib
            os: macos-latest

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            ext: dylib
            os: macos-latest

          # iOS device
          - target: aarch64-apple-ios
            ext: dylib
            os: macos-latest

          # iOS simulator
          - target: x86_64-apple-ios
            ext: dylib
            os: macos-latest

          # Android arm64
          - target: aarch64-linux-android
            ext: so
            os: ubuntu-latest
            envkey: AARCH64_LINUX_ANDROID
            linker: aarch64-linux-android21-clang

          # Android armv7
          - target: armv7-linux-androideabi
            ext: so
            os: ubuntu-latest
            envkey: ARMV7_LINUX_ANDROIDEABI
            linker: armv7a-linux-androideabi21-clang

          # Android x86
          - target: i686-linux-android
            ext: so
            os: ubuntu-latest
            envkey: I686_LINUX_ANDROID
            linker: i686-linux-android21-clang

          # Android x86_64
          - target: x86_64-linux-android
            ext: so
            os: ubuntu-latest
            envkey: X86_64_LINUX_ANDROID
            linker: x86_64-linux-android21-clang

    runs-on: ${{ matrix.os }}
    env:
      filename: lib_flutter_plugin
      ANDROID_NDK_VERSION: r26d
      ANDROID_API_LEVEL: 21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: rustup-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rustup-${{ runner.os }}-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}

      - name: Set up Linker, AR, and CC
        if: contains(matrix.target, 'android')
        run: |
          TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin

          # Cargo environment
          echo "CARGO_TARGET_${{ matrix.envkey }}_AR=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_${{ matrix.envkey }}_LINKER=$TOOLCHAIN/${{ matrix.linker }}" >> $GITHUB_ENV

          # cc-rs and ring compatibility
          echo "AR_${{ matrix.target }}=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "AR_${{ matrix.envkey }}=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "CC_${{ matrix.target }}=$TOOLCHAIN/${{ matrix.linker }}" >> $GITHUB_ENV
          echo "CC_${{ matrix.envkey }}=$TOOLCHAIN/${{ matrix.linker }}" >> $GITHUB_ENV
          echo "TARGET_CC=$TOOLCHAIN/${{ matrix.linker }}" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/${{ matrix.linker }}" >> $GITHUB_ENV

      - name: Setup iOS toolchain
        if: contains(matrix.target, 'apple-ios')
        run: rustup target add ${{ matrix.target }}

      - name: Set Apple deployment targets
        if: contains(matrix.target, 'apple')
        shell: bash
        run: |
          echo "IPHONEOS_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Build (Apple)
        if: contains(matrix.target, 'apple')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Android)
        if: contains(matrix.target, 'android')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Other)
        if: "!contains(matrix.target, 'apple') && !contains(matrix.target, 'android')"
        run: |
          cargo install cross
          cross build --release --target ${{ matrix.target }}

      # Rename step for Linux/macOS
      - name: Rename output (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/*.${{ matrix.ext }} artifacts/${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}

      # Rename step for Windows
      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target\${{ matrix.target }}\release\*.${{ matrix.ext }}" "artifacts\${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.filename }}-${{ matrix.target }}
          path: artifacts/${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read Cargo.toml version
        id: cargo
        run: |
          VERSION=$(grep '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cargo.outputs.version }}
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


