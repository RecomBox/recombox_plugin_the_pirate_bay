name: Build and Release Rust Library

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            ext: dll
            os: windows-latest

          # Linux
          - target: x86_64-unknown-linux-gnu
            ext: so
            os: ubuntu-latest

          # macOS Intel
          - target: x86_64-apple-darwin
            ext: dylib
            os: macos-latest

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            ext: dylib
            os: macos-latest

          # iOS device
          - target: aarch64-apple-ios
            ext: dylib
            os: macos-latest

          # iOS simulator
          - target: x86_64-apple-ios
            ext: dylib
            os: macos-latest

          # Android arm64
          - target: aarch64-linux-android
            ext: so
            os: ubuntu-latest

          # Android armv7
          - target: armv7-linux-androideabi
            ext: so
            os: ubuntu-latest

          # Android x86
          - target: i686-linux-android
            ext: so
            os: ubuntu-latest

          # Android x86_64
          - target: x86_64-linux-android
            ext: so
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    env:
      filename: lib_the_pirate_bay
      RUSTFLAGS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rustup toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: rustup-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rustup-${{ runner.os }}-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: true

      # Install build dependencies on Linux
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config libssl-dev cmake nasm
          sudo apt-get install -y gcc-12 g++-12
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 100
          echo "CC=gcc-12" >> $GITHUB_ENV
          echo "CXX=g++-12" >> $GITHUB_ENV

      # Set compiler for macOS/iOS
      - name: Set macOS/iOS compiler
        if: runner.os == 'macOS'
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install --force cross --git https://github.com/cross-rs/cross

      # Android NDK setup
      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      # iOS setup
      - name: Setup iOS toolchain
        if: contains(matrix.target, 'apple-ios')
        run: rustup target add ${{ matrix.target }}

      # Set deployment targets for Apple builds
      - name: Set Apple deployment targets
        if: contains(matrix.target, 'apple')
        run: |
          echo "IPHONEOS_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Build
        run: |
          if [[ "${{ matrix.target }}" == *"apple"* ]]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Rename output
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/*.${{ matrix.ext }} artifacts/${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.filename }}-${{ matrix.target }}
          path: artifacts/${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
