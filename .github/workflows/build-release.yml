name: Build Flutter FFI Library

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows desktop
          - target: x86_64-pc-windows-msvc
            ext: dll
            os: windows-latest

          # Linux desktop
          - target: x86_64-unknown-linux-gnu
            ext: so
            os: ubuntu-latest

          # macOS Intel
          - target: x86_64-apple-darwin
            ext: dylib
            os: macos-latest

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            ext: dylib
            os: macos-latest

          # iOS device
          - target: aarch64-apple-ios
            ext: dylib
            os: macos-latest

          # iOS simulator
          - target: x86_64-apple-ios
            ext: dylib
            os: macos-latest

          # Android arm64
          - target: aarch64-linux-android
            ext: so
            os: ubuntu-latest

          # Android armv7
          - target: armv7-linux-androideabi
            ext: so
            os: ubuntu-latest

          # Android x86
          - target: i686-linux-android
            ext: so
            os: ubuntu-latest

          # Android x86_64 (panic=abort required)
          - target: x86_64-linux-android
            ext: so
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    env:
      filename: lib_flutter_plugin
      RUSTFLAGS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: rustup-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rustup-${{ runner.os }}-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Setup iOS toolchain
        if: contains(matrix.target, 'apple-ios')
        run: rustup target add ${{ matrix.target }}

      - name: Set Apple deployment targets
        if: contains(matrix.target, 'apple')
        shell: bash
        run: |
          echo "IPHONEOS_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      # Special case: Android x86_64 needs panic=abort
      - name: Set panic=abort for Android x86_64
        if: matrix.target == 'x86_64-linux-android'
        run: echo "RUSTFLAGS=-C panic=abort" >> $GITHUB_ENV

      - name: Build (Apple)
        if: contains(matrix.target, 'apple')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Cross)
        if: "!contains(matrix.target, 'apple')"
        run: |
          cargo install cross
          cross build --release --target ${{ matrix.target }}

      # Rename step for Linux/macOS
      - name: Rename output (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/*.${{ matrix.ext }} artifacts/${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}

      # Rename step for Windows
      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target\${{ matrix.target }}\release\*.${{ matrix.ext }}" "artifacts\${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.filename }}-${{ matrix.target }}
          path: artifacts/${{ env.filename }}-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
